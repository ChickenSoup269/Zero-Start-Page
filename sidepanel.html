<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Notepad</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Modular Styles -->
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/widgets.css">
    <link rel="stylesheet" href="styles/dialog.css">
    
    <style>
        /* Clean minimal background */
        body {
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 16px;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        
        #notepad-container {
            display: flex !important;
            flex-direction: column;
            position: relative;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: none;
            flex: 1;
            /* Premium Glassmorphism */
            background: rgba(15, 15, 20, 0.45) !important;
            backdrop-filter: blur(24px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 16px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
            overflow: hidden;
        }

        .notepad-header {
            padding: 20px 24px !important;
            background: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .notepad-header.drag-handle {
            cursor: default;
        }
        
        .notepad-header h3 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notepad-header h3 i {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
        }

        #add-note-btn {
            background: rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 50% !important;
            width: 40px !important;
            height: 40px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 1.1rem !important;
            cursor: pointer !important;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        #add-note-btn:hover {
            transform: scale(1.15) rotate(90deg) !important;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6) !important;
        }
        
        .notepad-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
        }

        /* Empty state */
        .notes-list:empty::after {
            content: "Take a quick note...\n\nClick the + button to start capturing your thoughts.";
            white-space: pre-wrap;
            display: block;
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            line-height: 1.6;
        }
        
        /* Note Item Styling */
        .note-item {
            width: 100% !important;
            max-width: 100% !important;
            min-width: unset !important;
            box-sizing: border-box;
            margin-bottom: 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.3s, border-color 0.3s;
        }

        .note-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3) !important;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .note-header {
            background: transparent !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
            padding: 14px 16px !important;
        }

        .note-title-input {
            font-size: 1.1rem !important;
            font-weight: 600 !important;
            background: transparent !important;
            border: none !important;
            padding: 0 !important;
            color: rgba(255, 255, 255, 0.9) !important;
            flex: 1;
        }
        
        .note-title-input:focus {
            box-shadow: none !important;
            border: none !important;
            color: #fff !important;
        }

        .note-content {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 16px !important;
            font-size: 1rem !important;
            color: rgba(255, 255, 255, 0.8) !important;
            line-height: 1.7 !important;
        }

        .note-content:focus {
            color: rgba(255, 255, 255, 1) !important;
        }
        
        /* Floating Note Window (if re-attached inside sidepanel) */
        .floating-note-window {
            width: 100% !important;
            position: relative !important;
            top: auto !important;
            left: auto !important;
            right: auto !important;
            box-sizing: border-box;
            margin-bottom: 20px;
            transform: none !important;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
        }

        /* Better Scrollbar for sidepanel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Dialogs */
        #confirm-dialog-container, #prompt-dialog-container {
            position: fixed;
            inset: 0;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <script type="module" src="sidepanel.js"></script>
</body>
</html>
